<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a1f">
    <title>🎂 تولدت مبارک</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&family=Parastoo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- پس‌زمینه -->
    <div class="bg-main"></div>
    <div class="night-sky" id="nightSky"></div>
    <canvas id="particlesCanvas"></canvas>


    <!-- پاکت نامه - ساده با استیکر -->
    <div class="envelope-stage" id="envelopeStage">
        <div class="envelope-shadow"></div>
        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="envelope" id="envelope">
                <div class="envelope-body">
                    <!-- استیکر شخصیت با کیک -->
                    <img src="images/sticker.png" 
                         alt="تولدت مبارک" 
                         class="envelope-sticker"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <!-- فال‌بک اگه عکس لود نشد -->
                   
                </div>
                <div class="envelope-flap" id="envelopeFlap"></div>
            </div>
        </div>
    </div>

    <!-- نامه -->
    <div class="letter-stage hidden" id="letterStage">
        <div class="letter" id="letter">
            <div class="letter-frame">
                <div class="letter-content">
                    <!-- استیکر بالای نامه -->
                    <div class="letter-header">
                        <img src="images/sticker.png" 
                             alt="تولدت مبارک" 
                             class="letter-sticker"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <div class="letter-sticker-fallback" style="display:none;">🎂</div>
                        <div class="letter-greeting">سلام رفیق خوبم!</div>
                    </div>
                    <div class="letter-body" id="letterBody"></div>
                    <div class="letter-signature">
                        <div class="signature-line">با تمام دوستی‌ام،</div>
                        <div class="signature-name">دوست همیشگی‌ات ♥</div>
                    </div>
                    <div class="letter-footer">
                        <span>🎉</span>
                        <span>تولدت مبارک</span>
                        <span>🎉</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- راهنما -->
    <div class="hint" id="hint">
        <span class="hint-icon">👆</span>
        <span class="hint-text">روی پاکت بزن</span>
    </div>

    <!-- کنترل‌ها -->
    <div class="controls">
        <button class="ctrl-btn" id="musicBtn" title="موسیقی">
            <span id="musicIcon">🎵</span>
        </button>
        <button class="ctrl-btn" id="soundBtn" title="صدا">
            <span id="soundIcon">🔊</span>
        </button>
        <button class="ctrl-btn hidden" id="closeBtn" title="بستن">
            <span>🔙</span>
        </button>
    </div>

    <!-- نوار پیشرفت -->
    <div class="progress-bar hidden" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">در حال نوشتن...</div>
    </div>

    <!-- موسیقی -->
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_4cb1c9d7e0.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
