<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a1f">
    <title>🎂 تولدت مبارک</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&family=Parastoo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- پس‌زمینه -->
    <div class="bg-main"></div>
    <div class="night-sky" id="nightSky"></div>
    <canvas id="particlesCanvas"></canvas>

    <!-- کیک تولد -->
    <div class="cake-stage" id="cakeStage">
        <div class="cake">
            <div class="cake-tier cake-top">
                <div class="tier-decoration"></div>
                <div class="candles-row" id="candlesTop"></div>
                <div class="tier-top"></div>
            </div>
            <div class="cake-tier cake-middle">
                <div class="tier-decoration"></div>
                <div class="candles-row" id="candlesMiddle"></div>
                <div class="drip drip-1"></div>
                <div class="drip drip-2"></div>
                <div class="drip drip-3"></div>
            </div>
            <div class="cake-tier cake-bottom">
                <div class="tier-decoration"></div>
                <div class="candles-row" id="candlesBottom"></div>
                <div class="drip drip-4"></div>
                <div class="drip drip-5"></div>
            </div>
            <div class="cake-plate"></div>
            <div class="age-number">
                <span>۱</span><span>۹</span>
            </div>
        </div>
    </div>

    <!-- پاکت نامه -->
    <div class="envelope-stage" id="envelopeStage">
        <div class="envelope-shadow"></div>
        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="envelope" id="envelope">
                <div class="envelope-body">
                    <img id="envelopeSticker"
                         src="images/sticker.png"
                         alt="تولدت مبارک"
                         class="envelope-sticker">
                    <div class="envelope-sticker-fallback">🎂</div>
                    <div class="envelope-tap-hint">👆 بزن اینجا</div>
                </div>
                <div class="envelope-flap" id="envelopeFlap"></div>
            </div>
        </div>
    </div>

    <!-- نامه -->
    <div class="letter-stage hidden" id="letterStage">
        <div class="letter" id="letter">
            <div class="letter-frame">
                <div class="letter-content">
                    <div class="letter-header">
                        <img id="letterSticker"
                             src="images/sticker.png"
                             alt="تولدت مبارک"
                             class="letter-sticker">
                        <div class="letter-sticker-fallback">🎂</div>
                        <div class="letter-greeting">سلام رفیق خوبم!</div>
                    </div>
                    <div class="letter-body" id="letterBody"></div>
                    <div class="letter-signature">
                        <div class="signature-line">با تمام دوستی‌ام،</div>
                        <div class="signature-name">دوست همیشگی‌ات ♥</div>
                    </div>
                    <div class="letter-footer">
                        <span>🎉</span>
                        <span>تولدت مبارک</span>
                        <span>🎉</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- راهنما -->
    <div class="hint" id="hint">
        <span>👆</span>
        <span>روی پاکت بزن تا نامه باز بشه</span>
    </div>

    <!-- نوار پیشرفت -->
    <div class="progress-bar hidden" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text">در حال نوشتن نامه...</div>
    </div>

    <!-- کنترل‌ها -->
    <div class="controls">
        <button class="ctrl-btn hidden" id="closeBtn" type="button">✕</button>
        <button class="ctrl-btn active" id="musicBtn" type="button">
            <span id="musicIcon">🎵</span>
        </button>
        <button class="ctrl-btn active" id="soundBtn" type="button">
            <span id="soundIcon">🔊</span>
        </button>
    </div>

    <!-- صدای زمینه -->
    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
