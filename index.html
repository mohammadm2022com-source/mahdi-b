<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1a2e">
    <title>💌 نامه‌ای از دل</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&family=Parastoo:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- پس‌زمینه‌ها -->
    <div class="bg-pattern"></div>
    <div class="bg-gradient"></div>
    <div class="night-sky" id="nightSky"></div>
    <canvas id="particlesCanvas"></canvas>

    <!-- ماه بزرگ -->
    <div class="sky-decoration">
        <div class="big-crescent">
            <div class="crescent-moon"></div>
            <div class="crescent-glow"></div>
        </div>
    </div>

    <!-- فانوس‌های معلق -->
    <div class="lanterns-container">
        <div class="lantern lantern-1">
            <div class="lantern-string"></div>
            <div class="lantern-body">
                <div class="lantern-cap"></div>
                <div class="lantern-glass">
                    <div class="lantern-flame"></div>
                </div>
                <div class="lantern-base"></div>
                <div class="lantern-tassel"></div>
            </div>
        </div>
        <div class="lantern lantern-2">
            <div class="lantern-string"></div>
            <div class="lantern-body">
                <div class="lantern-cap"></div>
                <div class="lantern-glass">
                    <div class="lantern-flame"></div>
                </div>
                <div class="lantern-base"></div>
                <div class="lantern-tassel"></div>
            </div>
        </div>
        <div class="lantern lantern-3">
            <div class="lantern-string"></div>
            <div class="lantern-body">
                <div class="lantern-cap"></div>
                <div class="lantern-glass">
                    <div class="lantern-flame"></div>
                </div>
                <div class="lantern-base"></div>
                <div class="lantern-tassel"></div>
            </div>
        </div>
    </div>

    <!-- مسجد سیلوئت -->
    <div class="mosque-silhouette">
        <div class="mosque-minaret m1"></div>
        <div class="mosque-dome"></div>
        <div class="mosque-minaret m2"></div>
    </div>

    <!-- استیکرهای شناور -->
    <div class="stickers-container" id="stickersContainer"></div>

    <!-- پاکت نامه -->
    <div class="envelope-stage" id="envelopeStage">
        <div class="envelope-shadow"></div>
        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="envelope" id="envelope">
                <div class="envelope-back"></div>
                <div class="envelope-inner-paper"></div>
                <div class="envelope-left"></div>
                <div class="envelope-right"></div>
                <div class="envelope-front">
                    <div class="envelope-pattern"></div>
                    <div class="envelope-bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
                    <div class="wax-seal">
                        <div class="seal-inner">۞</div>
                    </div>
                    <div class="envelope-text">نامه‌ای برای تو</div>
                    <div class="envelope-subtext">دوست نازنینم</div>
                </div>
                <div class="envelope-flap" id="envelopeFlap">
                    <div class="flap-pattern"></div>
                    <div class="flap-emboss"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- نامه (خارج از پاکت) -->
    <div class="letter-stage hidden" id="letterStage">
        <div class="letter" id="letter">
            <div class="letter-frame">
                <div class="corner-decor tl"></div>
                <div class="corner-decor tr"></div>
                <div class="corner-decor bl"></div>
                <div class="corner-decor br"></div>
                <div class="letter-content">
                    <div class="letter-bismillah">﷽</div>
                    <div class="letter-greeting">سلام بر تو ای یار صمیمی ❤</div>
                    <div class="letter-body" id="letterBody"></div>
                    <div class="letter-signature">
                        <div class="signature-line">دوستی که همیشه در قلبش جا داری</div>
                        <div class="signature-name">— برادر کوچکترت</div>
                    </div>
                    <div class="letter-footer">
                        <span class="heart-beat">♥</span>
                        <span class="prayer">اللَّهُمَّ احْفَظْهُ</span>
                        <span class="heart-beat">♥</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- راهنما -->
    <div class="hint" id="hint">
        <span class="hint-icon">👆</span>
        <span class="hint-text">روی پاکت بزن</span>
    </div>

    <!-- کنترل‌ها -->
    <div class="controls">
        <button class="ctrl-btn" id="musicBtn" title="موسیقی">
            <span id="musicIcon">🎵</span>
        </button>
        <button class="ctrl-btn" id="soundBtn" title="صدا">
            <span id="soundIcon">🔊</span>
        </button>
        <button class="ctrl-btn hidden" id="closeBtn" title="بستن">
            <span>🔙</span>
        </button>
    </div>

    <!-- نوار پیشرفت -->
    <div class="progress-bar hidden" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">در حال نوشتن...</div>
    </div>

    <!-- موسیقی -->
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_4cb1c9d7e0.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
